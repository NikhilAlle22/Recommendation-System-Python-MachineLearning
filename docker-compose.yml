version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    container_name: recommendation_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    restart: always

  dashboard:
    build:
      context: .
      dockerfile: dashboard.Dockerfile
    container_name: recommendation_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: always
